name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --check
  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: cargo msrv verify
  final:
    needs: [test, msrv]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    # Run on success or upstream failure but skip when the workflow is cancelled
    # — `always()` would override `cancel-in-progress` and waste a runner.
    if: ${{ !cancelled() }}
    steps:
      - name: Check CI job results
        run: |
          results=("${{ needs.test.result }}" "${{ needs.msrv.result }}")
          for r in "${results[@]}"; do
            if [ "$r" != "success" ]; then
              echo "CI job failed or was skipped"
              exit 1
            fi
          done
