# git-cliff ~ default configuration file
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
"""
body = """
{% if version %}\
    {% if previous.version %}\
        ## [{{ version | trim_start_matches(pat="v") }}]($REPO/compare/{{ previous.version }}..{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
    {% else %}\
        ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
    {% endif %}\
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}

    {% for commit in commits
    | filter(attribute="scope")
    | sort(attribute="scope") -%}
        {% if commit.scope -%}
        - {{self::commit(commit=commit)}}\
        {% endif -%}
    {% endfor -%}
    {% for commit in commits -%}
        {% if commit.scope -%}
        {% else -%}
          - {{self::commit(commit=commit)}}\
        {% endif -%}
    {% endfor -%}
{% endfor %}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 -%}
### New Contributors
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  - @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]($REPO/pull/{{ contributor.pr_number }})\
    {% endif %}\
{% endfor %}

{% endif -%}
{% macro commit(commit) -%}
{% if commit.scope %}**({{commit.scope}})** {% endif -%}
{% if commit.breaking %}**breaking** {% endif -%}
{{ commit.message | split(pat="\n") | first | trim }} by \
{% if commit.remote.username %}[@{{commit.remote.username}}](https://github.com/{{commit.remote.username}})\
{% else %}{{commit.author.name}}{% endif %} in \
{% if commit.remote.pr_number %}[#{{ commit.remote.pr_number }}]($REPO/pull/{{ commit.remote.pr_number }})\
{% else %}[{{ commit.id | truncate(length=7, end="") }}]($REPO/commit/{{ commit.id }})\
{%- endif %}
{% endmacro commit -%}
"""
footer = """
<!-- generated by git-cliff -->
"""
postprocessors = [
  { pattern = '\$REPO', replace = "https://github.com/jdx/pklr" },
]
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
  { pattern = '\(#([0-9]+)\)', replace = "" },
]
commit_parsers = [
  { message = '^chore\(release\): prepare for', skip = true },
  { message = '^chore\(pr\)', skip = true },
  { message = '^chore\(pull\)', skip = true },
  { message = '^chore: (release|Release)', skip = true },
  { message = '^Release', skip = true },
  { message = "^Merge commit", skip = true },
  { body = '.*security', group = "<!-- 08 -->🛡️ Security" },
  { message = '^(chore|fix)\(deps\):', group = "<!-- 99 -->📦️ Dependency Updates", scope = "" },
  { message = '^feat', group = "<!-- 00 -->🚀 Features" },
  { message = '^fix', group = "<!-- 01 -->🐛 Bug Fixes" },
  { message = '^refactor', group = "<!-- 02 -->🚜 Refactor" },
  { message = '^doc', group = "<!-- 03 -->📚 Documentation" },
  { message = '^style', group = "<!-- 05 -->🎨 Styling" },
  { message = '^perf', group = "<!-- 04 -->⚡ Performance" },
  { message = '^test', group = "<!-- 06 -->🧪 Testing" },
  { message = '^revert', group = "<!-- 09 -->◀️ Revert" },
  { message = '.', group = "<!-- 10 -->🔍 Other Changes" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = '^v\d+\.\d+\.\d+$'
topo_order = false
sort_commits = "oldest"

[remote.github]
owner = "jdx"
repo  = "pklr"
